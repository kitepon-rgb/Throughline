<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid meet" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0f17"/>
      <stop offset="100%" stop-color="#1a1f2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#3aa0ff"/>
    </linearGradient>
    <linearGradient id="full" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b6b" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ff9f6b" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="lite" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3aa0ff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#7c5cff" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle dotted grid -->
  <g fill="#ffffff" opacity="0.04">
    <circle cx="60"   cy="80"  r="1.4"/>
    <circle cx="180"  cy="80"  r="1.4"/>
    <circle cx="300"  cy="80"  r="1.4"/>
    <circle cx="420"  cy="80"  r="1.4"/>
    <circle cx="540"  cy="80"  r="1.4"/>
    <circle cx="660"  cy="80"  r="1.4"/>
    <circle cx="780"  cy="80"  r="1.4"/>
    <circle cx="900"  cy="80"  r="1.4"/>
    <circle cx="1020" cy="80"  r="1.4"/>
    <circle cx="1140" cy="80"  r="1.4"/>
    <circle cx="60"   cy="200" r="1.4"/>
    <circle cx="180"  cy="200" r="1.4"/>
    <circle cx="300"  cy="200" r="1.4"/>
    <circle cx="420"  cy="200" r="1.4"/>
    <circle cx="540"  cy="200" r="1.4"/>
    <circle cx="660"  cy="200" r="1.4"/>
    <circle cx="780"  cy="200" r="1.4"/>
    <circle cx="900"  cy="200" r="1.4"/>
    <circle cx="1020" cy="200" r="1.4"/>
    <circle cx="1140" cy="200" r="1.4"/>
    <circle cx="60"   cy="320" r="1.4"/>
    <circle cx="180"  cy="320" r="1.4"/>
    <circle cx="300"  cy="320" r="1.4"/>
    <circle cx="420"  cy="320" r="1.4"/>
    <circle cx="540"  cy="320" r="1.4"/>
    <circle cx="660"  cy="320" r="1.4"/>
    <circle cx="780"  cy="320" r="1.4"/>
    <circle cx="900"  cy="320" r="1.4"/>
    <circle cx="1020" cy="320" r="1.4"/>
    <circle cx="1140" cy="320" r="1.4"/>
    <circle cx="60"   cy="440" r="1.4"/>
    <circle cx="180"  cy="440" r="1.4"/>
    <circle cx="300"  cy="440" r="1.4"/>
    <circle cx="420"  cy="440" r="1.4"/>
    <circle cx="540"  cy="440" r="1.4"/>
    <circle cx="660"  cy="440" r="1.4"/>
    <circle cx="780"  cy="440" r="1.4"/>
    <circle cx="900"  cy="440" r="1.4"/>
    <circle cx="1020" cy="440" r="1.4"/>
    <circle cx="1140" cy="440" r="1.4"/>
    <circle cx="60"   cy="560" r="1.4"/>
    <circle cx="180"  cy="560" r="1.4"/>
    <circle cx="300"  cy="560" r="1.4"/>
    <circle cx="420"  cy="560" r="1.4"/>
    <circle cx="540"  cy="560" r="1.4"/>
    <circle cx="660"  cy="560" r="1.4"/>
    <circle cx="780"  cy="560" r="1.4"/>
    <circle cx="900"  cy="560" r="1.4"/>
    <circle cx="1020" cy="560" r="1.4"/>
    <circle cx="1140" cy="560" r="1.4"/>
  </g>

  <!-- accent rule -->
  <rect x="80" y="100" width="64" height="6" rx="3" fill="url(#accent)"/>

  <!-- product name -->
  <text x="80" y="170" font-size="56" font-weight="700" fill="#ffffff" letter-spacing="-1">Throughline</text>

  <!-- tagline -->
  <text x="80" y="230" font-size="30" font-weight="500" fill="#c8cce0">
    Cut ~90% of Claude Code's context usage
  </text>
  <text x="80" y="270" font-size="30" font-weight="500" fill="#c8cce0">
    while keeping nearly all the memory.
  </text>

  <!-- comparison: full vs Throughline -->
  <g transform="translate(80, 320)">
    <!-- full bar -->
    <text x="0" y="-10" font-size="18" font-weight="600" fill="#ff8a8a" letter-spacing="0.5">WITHOUT THROUGHLINE</text>
    <rect x="0" y="0" width="1040" height="44" rx="6" fill="url(#full)"/>
    <text x="1020" y="29" text-anchor="end" font-size="20" font-weight="700" fill="#1a1024">≈ 125,000 tok  (80% tool I/O)</text>

    <!-- lite bar -->
    <text x="0" y="86" font-size="18" font-weight="600" fill="#9bc7ff" letter-spacing="0.5">WITH THROUGHLINE</text>
    <rect x="0" y="96" width="108" height="44" rx="6" fill="url(#lite)"/>
    <text x="120" y="125" font-size="20" font-weight="700" fill="#ffffff">≈ 13,000 tok</text>
    <text x="270" y="125" font-size="20" font-weight="500" fill="#9aa1c0">— same decisions, 90% lighter</text>
  </g>

  <!-- bottom row: feature chips -->
  <g transform="translate(80, 540)" font-size="18" font-weight="600" fill="#c8cce0">
    <rect x="0"   y="-22" width="200" height="36" rx="18" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="100" y="2" text-anchor="middle">/clear-safe memory</text>

    <rect x="216" y="-22" width="200" height="36" rx="18" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="316" y="2" text-anchor="middle">multi-session monitor</text>

    <rect x="432" y="-22" width="200" height="36" rx="18" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="532" y="2" text-anchor="middle">zero dependencies</text>

    <rect x="648" y="-22" width="200" height="36" rx="18" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="748" y="2" text-anchor="middle">Win / macOS / Linux</text>
  </g>

  <!-- right-side accent shape -->
  <g transform="translate(960, 70)" opacity="0.85">
    <rect x="0"  y="0"  width="160" height="14" rx="7" fill="url(#accent)"/>
    <rect x="0"  y="26" width="120" height="14" rx="7" fill="#ffffff" opacity="0.18"/>
    <rect x="0"  y="52" width="92"  height="14" rx="7" fill="#ffffff" opacity="0.10"/>
    <text x="0" y="100" font-size="14" font-weight="600" fill="#9aa1c0" letter-spacing="2">L1 · L2 · L3</text>
    <text x="0" y="124" font-size="14" font-weight="500" fill="#7d8399">layered memory</text>
  </g>
</svg>
